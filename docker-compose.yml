services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  server:
    build: ./server
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      PORT: 5001
      FRONTEND_URL: http://localhost:5173
      MONGO_URI: mongodb://mongo:27017/ai_mock_interview
      JWT_SECRET: replace-with-a-long-random-secret
      GEMINI_API_KEY: replace-with-your-gemini-api-key
    ports:
      - "5001:5001"

volumes:
  mongo-data:
